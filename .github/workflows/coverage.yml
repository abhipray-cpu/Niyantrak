name: Code Coverage & Reports

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main, develop ]

jobs:
  coverage:
    name: Coverage Analysis
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      pull-requests: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25'
          cache: true
      
      - name: Generate coverage report
        run: go test -v -coverprofile=coverage.out -covermode=atomic ./...
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.out
          flags: unittests
          name: codecov-umbrella
          verbose: true
          fail_ci_if_error: false
      
      - name: Generate coverage badge
        run: |
          coverage=$(go tool cover -func=coverage.out | grep total | awk '{print int($3)}')
          echo "Coverage: ${coverage}%"
          echo "COVERAGE=${coverage}" >> $GITHUB_ENV
      
      - name: Comment PR with coverage
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const coverage = process.env.COVERAGE;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `📊 **Code Coverage: ${coverage}%**\n\nFull report available [here](https://app.codecov.io/github/${{ github.repository }})`
            });

  benchmark:
    name: Benchmark Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25'
          cache: true
      
      - name: Run benchmarks
        run: go test -v -run=^$ -bench=. -benchmem -benchtime=10s ./... > benchmark_results.txt || true
      
      - name: Upload benchmark results
        uses: actions/upload-artifact@v3
        with:
          name: benchmark-results
          path: benchmark_results.txt
          retention-days: 30
      
      - name: Store benchmark
        uses: benchmark-action/github-action-benchmark@v1
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          tool: 'go'
          output-file-path: benchmark_results.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
