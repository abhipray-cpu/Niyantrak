run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - bodyclose
    - durationcheck
    - errname
    - errorlint
    - gocritic
    - gofmt
    - goimports
    - misspell
    - nilerr
    - prealloc
    - predeclared
    - revive
    - unconvert
    - unparam
    - whitespace

linters-settings:
  errcheck:
    check-type-assertions: true
  gocritic:
    enabled-tags:
      - diagnostic
      - style
      - performance
    disabled-checks:
      - hugeParam          # structs passed by value: valid Go style for config types
      - unnamedResult      # unnamed interface returns are idiomatic for algorithm.Allow
      - paramTypeCombine   # minor style; would change public API signatures
  govet:
    enable-all: true
    disable:
      - fieldalignment     # struct padding: cosmetic; fixing would shuffle every struct
  revive:
    rules:
      - name: blank-imports
      - name: exported
      - name: var-naming
      - name: indent-error-flow
      - name: range
      - name: error-return
      - name: error-naming
      - name: increment-decrement
      - name: superfluous-else
      - name: unreachable-code

issues:
  max-issues-per-linter: 50
  max-same-issues: 5
  exclude-rules:
    # Allow unchecked errors in tests
    - path: _test\.go
      linters:
        - errcheck
        - gocritic
    # Allow dot imports in tests (testify etc.)
    - path: _test\.go
      text: "dot-imports"
    # Allow shadowing in tests
    - path: _test\.go
      linters:
        - govet
      text: "shadow"
    # Examples can have unused parameters
    - path: examples/
      linters:
        - unparam
        - unused
    # Mock files
    - path: mocks/
      linters:
        - revive
        - unused
    # Stutter names are part of the stable v1.0.0 public API; renaming would be breaking
    - linters:
        - revive
      text: "stutters"
