services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: niyantrak
      POSTGRES_PASSWORD: niyantrak
      POSTGRES_DB: niyantrak_test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U niyantrak"]
      interval: 2s
      timeout: 3s
      retries: 5

  # ---- Redis Cluster (6 nodes: 3 masters + 3 replicas) ----
  # Nodes announce via host.docker.internal so the cluster gossip bus
  # routes through the Docker host gateway (macOS / Colima).
  # Both the client port and the gossip bus port (port+10000) must be mapped.
  redis-node-1:
    image: redis:7-alpine
    command: >
      redis-server
      --port 7001
      --cluster-enabled yes
      --cluster-config-file nodes.conf
      --cluster-node-timeout 5000
      --appendonly yes
      --cluster-announce-ip host.docker.internal
      --cluster-announce-port 7001
      --cluster-announce-bus-port 17001
    ports:
      - "7001:7001"
      - "17001:17001"
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "7001", "ping"]
      interval: 2s
      timeout: 3s
      retries: 5

  redis-node-2:
    image: redis:7-alpine
    command: >
      redis-server
      --port 7002
      --cluster-enabled yes
      --cluster-config-file nodes.conf
      --cluster-node-timeout 5000
      --appendonly yes
      --cluster-announce-ip host.docker.internal
      --cluster-announce-port 7002
      --cluster-announce-bus-port 17002
    ports:
      - "7002:7002"
      - "17002:17002"
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "7002", "ping"]
      interval: 2s
      timeout: 3s
      retries: 5

  redis-node-3:
    image: redis:7-alpine
    command: >
      redis-server
      --port 7003
      --cluster-enabled yes
      --cluster-config-file nodes.conf
      --cluster-node-timeout 5000
      --appendonly yes
      --cluster-announce-ip host.docker.internal
      --cluster-announce-port 7003
      --cluster-announce-bus-port 17003
    ports:
      - "7003:7003"
      - "17003:17003"
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "7003", "ping"]
      interval: 2s
      timeout: 3s
      retries: 5

  redis-node-4:
    image: redis:7-alpine
    command: >
      redis-server
      --port 7004
      --cluster-enabled yes
      --cluster-config-file nodes.conf
      --cluster-node-timeout 5000
      --appendonly yes
      --cluster-announce-ip host.docker.internal
      --cluster-announce-port 7004
      --cluster-announce-bus-port 17004
    ports:
      - "7004:7004"
      - "17004:17004"
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "7004", "ping"]
      interval: 2s
      timeout: 3s
      retries: 5

  redis-node-5:
    image: redis:7-alpine
    command: >
      redis-server
      --port 7005
      --cluster-enabled yes
      --cluster-config-file nodes.conf
      --cluster-node-timeout 5000
      --appendonly yes
      --cluster-announce-ip host.docker.internal
      --cluster-announce-port 7005
      --cluster-announce-bus-port 17005
    ports:
      - "7005:7005"
      - "17005:17005"
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "7005", "ping"]
      interval: 2s
      timeout: 3s
      retries: 5

  redis-node-6:
    image: redis:7-alpine
    command: >
      redis-server
      --port 7006
      --cluster-enabled yes
      --cluster-config-file nodes.conf
      --cluster-node-timeout 5000
      --appendonly yes
      --cluster-announce-ip host.docker.internal
      --cluster-announce-port 7006
      --cluster-announce-bus-port 17006
    ports:
      - "7006:7006"
      - "17006:17006"
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "7006", "ping"]
      interval: 2s
      timeout: 3s
      retries: 5

  # Init container: forms the cluster once all 6 nodes are healthy
  redis-cluster-init:
    image: redis:7-alpine
    depends_on:
      redis-node-1:
        condition: service_healthy
      redis-node-2:
        condition: service_healthy
      redis-node-3:
        condition: service_healthy
      redis-node-4:
        condition: service_healthy
      redis-node-5:
        condition: service_healthy
      redis-node-6:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Creating Redis Cluster..."
        redis-cli --cluster create \
          redis-node-1:7001 redis-node-2:7002 redis-node-3:7003 \
          redis-node-4:7004 redis-node-5:7005 redis-node-6:7006 \
          --cluster-replicas 1 --cluster-yes
        echo "Redis Cluster created successfully"
        sleep 2
        redis-cli -h redis-node-1 -p 7001 cluster info | head -5
