name: PR Quality Checks

on:
  pull_request:
    branches: [ main, develop ]
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/**'

jobs:
  lint-commit:
    name: Lint Commit Messages
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Validate commit messages
        run: |
          commits=$(git rev-list ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }})
          for commit in $commits; do
            message=$(git log -1 --format=%B $commit)
            if ! echo "$message" | grep -qE "^(feat|fix|docs|style|refactor|perf|test|chore|ci)(\(.+\))?:"; then
              echo "❌ Invalid commit message: $message"
              echo "Format should be: type(scope): message"
              exit 1
            fi
          done
          echo "✅ All commit messages valid"

  code-quality:
    name: Code Quality Analysis
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25'
          cache: true
      
      - name: Check code formatting
        run: |
          if [ "$(gofmt -l . | wc -l)" -gt 0 ]; then
            echo "❌ Code not formatted. Run: gofmt -w ."
            gofmt -l .
            exit 1
          fi
      
      - name: Run go vet
        run: go vet ./...
      
      - name: Check for TODO comments
        run: |
          if grep -r "TODO\|FIXME\|HACK" --include="*.go" . | grep -v vendor | grep -v ".git"; then
            echo "⚠️  Found unresolved TODOs/FIXMEs - review if intentional"
          fi
      
      - name: Check test coverage
        run: |
          go test -v -coverprofile=coverage.out ./...
          coverage=$(go tool cover -func=coverage.out | grep total | awk '{print int($3)}')
          if [ "$coverage" -lt 70 ]; then
            echo "⚠️  Coverage is ${coverage}% (target: 70%)"
          fi
          echo "Coverage: ${coverage}%"

  documentation:
    name: Documentation Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25'
      
      - name: Check package documentation
        run: |
          missing=$(go doc -all ./... 2>&1 | grep "no documentation" | wc -l)
          if [ "$missing" -gt 0 ]; then
            echo "⚠️  Found $missing exported items without documentation"
            go doc -all ./... 2>&1 | grep "no documentation"
          fi
      
      - name: Check example files
        run: |
          if [ -d examples ]; then
            for file in examples/*/main.go; do
              if ! head -5 "$file" | grep -q "^//"; then
                echo "⚠️  $file missing documentation header"
              fi
            done
          fi

  size-check:
    name: Size & Complexity Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25'
      
      - name: Check file sizes
        run: |
          find . -name "*.go" -type f ! -path "./vendor/*" ! -path "./.git/*" | while read file; do
            lines=$(wc -l < "$file")
            if [ "$lines" -gt 1000 ]; then
              echo "⚠️  $file has $lines lines (consider splitting)"
            fi
          done
      
      - name: Check function complexity
        run: |
          if command -v gocyclo &> /dev/null; then
            gocyclo -over 10 ./... || echo "ℹ️  Some functions have high complexity"
          fi

  dependencies:
    name: Dependency Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25'
          cache: true
      
      - name: Download dependencies
        run: go mod download
      
      - name: Verify dependencies
        run: go mod verify
      
      - name: Check for unused dependencies
        run: go mod tidy -v
      
      - name: Check for security vulnerabilities
        uses: securego/gosec@master
        with:
          args: ./...

  summary:
    name: PR Summary
    needs: [lint-commit, code-quality, documentation, size-check, dependencies]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Generate summary
        run: |
          echo "## PR Quality Check Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Commit Messages | ${{ needs.lint-commit.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Code Quality | ${{ needs.code-quality.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Documentation | ${{ needs.documentation.result == 'success' && '✅' || '⚠️' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Size & Complexity | ${{ needs.size-check.result == 'success' && '✅' || '⚠️' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Dependencies | ${{ needs.dependencies.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
