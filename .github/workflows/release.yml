name: Release & Publishing

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test-before-release:
    name: Test Before Release
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25'
          cache: true
      
      - name: Run full test suite
        run: go test -v -race -timeout 10m ./...
      
      - name: Run linters
        uses: golangci/golangci-lint-action@v3
        with:
          version: latest
          args: --timeout=5m
      
      - name: Security scan
        uses: securego/gosec@master
        with:
          args: -no-fail ./...

  create-release:
    name: Create GitHub Release
    needs: test-before-release
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Get release notes
        id: release_notes
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          if [ -f CHANGELOG.md ]; then
            grep -A 100 "## \[$VERSION\]" CHANGELOG.md || echo "See commit history for changes" > /tmp/release_notes.txt
          else
            git log --oneline $(git describe --tags --abbrev=0 @^)..@^ > /tmp/release_notes.txt || echo "Initial release" > /tmp/release_notes.txt
          fi
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          body_path: /tmp/release_notes.txt
          draft: false
          prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'alpha') || contains(github.ref, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-docs:
    name: Publish Documentation
    needs: test-before-release
    runs-on: ubuntu-latest
    if: "!contains(github.ref, 'beta') && !contains(github.ref, 'alpha') && !contains(github.ref, 'rc')"
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25'
      
      - name: Generate documentation
        run: go doc -all ./... > docs/api-reference.md
      
      - name: Upload documentation
        uses: actions/upload-artifact@v3
        with:
          name: api-documentation
          path: docs/api-reference.md
          retention-days: 30

  notify:
    name: Notify Release
    needs: [create-release, publish-docs]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Extract version
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      
      - name: Create deployment status
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.ref,
              environment: 'production',
              description: 'Released ${{ steps.version.outputs.version }}',
              production_environment: true,
              auto_merge: false,
              required_contexts: []
            });
